<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon DAW Version</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="icon" href="./img/pokeball.gif" type="image/gif">
</head>

<body>
    <div class="displayDiv">
        <div id="overlappingDiv" class="battleEscene"></div>
        <canvas></canvas>

        <div class="footer">
            <div id="menuAccionesBatalla" class="battle-menu">
                <p class="battle-pregunta">Que quieres hacer?</p>
                <button type="button" id="botonMostrarAtaques">Atacar</button>
                <button type="button" id="botonCapturarPokemon">Capturar</button>
                <button type="button" id="botonHuirBatalla">Huir</button>
            </div>
            <div id="menuAtaquesBatalla" class="battle-menu ataques hidden">
                <p class="battle-pregunta">Elige un ataque</p>
                <button type="button" data-ataque="Tackle">Tackle</button>
                <button type="button" data-ataque="Ataque_Rapido">Ataque_Rapido</button>
                <button type="button" data-ataque="Trueno">Trueno</button>
                <button type="button" data-ataque="Tacleada_de_Voltios">Tacleada_de_Voltios</button>
            </div>
            <div id="dialogoBox"></div>
        </div>

        <div class="battle-ui">
            <div class="pokemon-status rival">
                <div class="pokemon-header">
                    <span class="name">CHARMANDER</span>
                    <span id="nivelRival" class="level">Lv.23</span>
                </div>

                <div id="HP_rival" class="hp-bar-container">
                    <span class="hp-label">HP</span>
                    <div class="hp-bar">
                        <div class="hp-fill"></div>
                    </div>
                </div>
            </div>

            <div class="pokemon-status player">
                <div class="pokemon-header">
                    <span class="name">PIKACHU</span>
                    <span id="nivelPikachu" class="level">Lv.25</span>
                </div>

                <div id="HP_jugador" class="hp-bar-container">
                    <span class="hp-label">HP</span>
                    <div class="hp-bar">
                        <div class="hp-fill"></div>
                    </div>
                </div>
                <div id="EXP_jugador" class="exp-info">EXP 0/20</div>
            </div>
        </div>

        <div id="menuBolsa" class="menu-bolsa">
            <div class="menu-bolsa-opciones">
                <button type="button" data-menu-opcion="guardar" class="activo">Guardar</button>
                <button type="button" data-menu-opcion="capturados">Pokemones capturados</button>
            </div>
            <div id="menuBolsaContenido" class="menu-bolsa-contenido"></div>
        </div>
    </div>
</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"
    integrity="sha512-H6cPm97FAsgIKmlBA4s774vqoN24V5gSQL4yBTDOY2su2DeXZVhQPxFK4P6GPdnZqM9fg1G3cMv5wD7e6cFLZQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="data/collision.js"></script>
<script src="data/zonaBattle.js"></script>
<script src="data/attacks.js"></script>
<script src="canvas.js"></script>
<script src="classes.js"></script>
<script src="battle.js"></script>
<script src="musica.js"></script>
<script src="spritesImg.js"></script>
<script src="mapeo.js"></script>
<script src="menu_bolsa.js"></script>
<script src="movilidad.js"></script>
<script src="script.js"></script>
</html>
